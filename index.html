<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bobiverse Star Map</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        color: #ccc;
        font-family: 'Courier New', monospace;
        overflow: hidden;
        height: 100vh;
      }

      #app {
        width: 100vw;
        height: 100vh;
      }

      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 20px;
        pointer-events: none;
        z-index: 10;
      }

      #title {
        font-size: 18px;
        color: #adf;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #subtitle {
        font-size: 11px;
        color: #556;
        margin-top: 2px;
      }

      #status {
        font-size: 11px;
        color: #556;
        text-align: right;
      }

      #controls-hint {
        position: fixed;
        bottom: 16px;
        left: 20px;
        font-size: 11px;
        color: #334;
        pointer-events: none;
        line-height: 1.6;
      }

      /* TODO: sidebar panel for filters — Phase 3 */
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div>
        <div id="title">Bobiverse Star Map</div>
        <div id="subtitle">Nearby stars · 100 ly radius</div>
      </div>
      <div id="status">Loading…</div>
    </div>

    <div id="controls-hint">
      Drag · rotate &nbsp;|&nbsp; Scroll · zoom &nbsp;|&nbsp; Right-drag · pan
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
