<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
    <title>Bobiverse Star Map</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        color: #ccc;
        font-family: 'Courier New', monospace;
        overflow: hidden;
        height: 100vh;
      }

      #app {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 16px 20px;
        pointer-events: none;
        z-index: 10;
      }

      #title {
        font-size: 18px;
        color: #adf;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      #subtitle {
        font-size: 11px;
        color: #889;
        margin-top: 2px;
      }

      #status {
        font-size: 11px;
        color: #889;
        text-align: right;
      }

      #controls-hint {
        position: fixed;
        bottom: 16px;
        left: 20px;
        font-size: 11px;
        color: #667;
        pointer-events: none;
        line-height: 1.6;
      }

      #footer-link {
        position: fixed;
        bottom: 16px;
        right: 20px;
        font-size: 11px;
        color: #667;
        line-height: 1.6;
      }

      #footer-link a {
        color: #7799bb;
        text-decoration: none;
      }

      #footer-link a:hover {
        color: #aad;
      }

      /* TODO: sidebar panel for filters — Phase 3 */

      #filter-panel {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: #889;
        pointer-events: auto;
        z-index: 10;
      }
      #dist-slider {
        width: 120px;
        accent-color: #4488cc;
        cursor: pointer;
      }
      #legend {
        position: fixed;
        bottom: 40px;
        right: 20px;
        font-size: 10px;
        color: #889;
        pointer-events: none;
        line-height: 1.5;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      #origin-info {
        position: fixed;
        top: 60px;
        left: 20px;
        font-size: 11px;
        color: #889;
        pointer-events: none;
        line-height: 1.6;
      }
      #origin-name {
        font-size: 13px;
        color: #adf;
        margin-bottom: 2px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div>
        <div id="title">Bobiverse Star Map</div>
        <div id="subtitle">Nearby stars · 100 ly radius</div>
      </div>
      <div id="status">Loading…</div>
    </div>

    <div id="filter-panel">
      <label for="dist-slider">Radius</label>
      <input type="range" id="dist-slider" min="5" max="20" value="10" step="1">
      <span id="dist-value">10 ly</span>
    </div>

    <div id="legend">
      <div class="legend-item"><span style="color:#9bb0ff">●</span> O</div>
      <div class="legend-item"><span style="color:#aabfff">●</span> B</div>
      <div class="legend-item"><span style="color:#cad7ff">●</span> A</div>
      <div class="legend-item"><span style="color:#f8f7ff">●</span> F</div>
      <div class="legend-item"><span style="color:#fff4ea">●</span> G</div>
      <div class="legend-item"><span style="color:#ffd2a1">●</span> K</div>
      <div class="legend-item"><span style="color:#ff9966">●</span> M</div>
    </div>

    <div id="origin-info">
      <div id="origin-name"></div>
      <div id="origin-details"></div>
    </div>

    <div id="controls-hint">
      Drag · rotate &nbsp;|&nbsp; Scroll · zoom &nbsp;|&nbsp; Click · set origin
    </div>

    <div id="footer-link">
      <a href="https://github.com/ruguevara/Bobiverse" target="_blank" rel="noopener">GitHub</a>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
