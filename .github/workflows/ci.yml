name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript type-check + Vite build ─────────────────────────────────────
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── JSON data validation ────────────────────────────────────────────────────
  validate-data:
    name: Validate JSON data files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSON syntax
        run: |
          for f in data/*.json; do
            python3 -c "import json,sys; json.load(open('$f'))" \
              && echo "✓ $f" \
              || { echo "✗ $f is invalid JSON"; exit 1; }
          done

  # ── Python script syntax check ──────────────────────────────────────────────
  validate-scripts:
    name: Validate Python scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Python syntax
        run: python3 -m py_compile scripts/process_hyg.py && echo "✓ process_hyg.py"

  # ── Deploy to GitHub Pages (main branch only) ───────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: [build, validate-data]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build
        run: npm ci && npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - id: deploy
        uses: actions/deploy-pages@v4
